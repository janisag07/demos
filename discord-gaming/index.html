<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Gaming Server Setup — Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'gg sans',Helvetica,Arial,sans-serif;background:#0f0f13;color:#dbdee1;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:12px}
.app{width:100%;max-width:860px;height:680px;background:#1a1a24;border-radius:12px;display:flex;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.sidebar{width:220px;background:#13131a;display:flex;flex-direction:column;flex-shrink:0}
.server{padding:14px 12px;border-bottom:1px solid #2a2a3a;font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px}
.server .icon{font-size:20px}
.categories{flex:1;overflow-y:auto;padding:8px 6px}
.cat-label{font-size:11px;font-weight:700;color:#8b5cf6;text-transform:uppercase;padding:8px 6px 4px;letter-spacing:.5px}
.ch{padding:6px 10px;border-radius:4px;font-size:13px;color:#6b6b80;cursor:pointer;display:flex;align-items:center;gap:6px;min-height:32px}
.ch:hover,.ch.active{background:#2a2a3a;color:#fff}
.ch .sym{color:#4a4a5c;font-size:14px;flex-shrink:0}
.ch.voice .sym{color:#8b5cf6}
.online-count{padding:8px 12px;font-size:11px;color:#6b6b80;border-top:1px solid #2a2a3a}
.online-count .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#22c55e;margin-right:4px}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:#1a1a24;padding:12px 16px;border-bottom:1px solid #2a2a3a;display:flex;align-items:center;gap:8px;font-weight:600;font-size:15px}
.topbar .sym{color:#4a4a5c}
.messages{flex:1;overflow-y:auto;padding:16px}
.msg-group{display:flex;gap:12px;margin-bottom:16px;animation:fadeIn .3s}
.msg-group .avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px}
.msg-group .avatar.bot{background:linear-gradient(135deg,#8b5cf6,#a855f7)}
.msg-group .avatar.user{background:#3b3b50}
.msg-group .avatar.feed{background:linear-gradient(135deg,#f97316,#ef4444)}
.msg-group .content{flex:1;min-width:0}
.msg-group .author{font-weight:600;font-size:14px;margin-bottom:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.msg-group .author .badge{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:500}
.badge.bot-badge{background:#8b5cf6;color:#fff}
.badge.mod{background:#f59e0b;color:#000}
.badge.admin{background:#ef4444;color:#fff}
.msg-group .author .time{color:#6b6b80;font-size:12px;font-weight:400}
.msg-group .text{font-size:14px;line-height:1.5;color:#dbdee1}
.embed{border-radius:4px;padding:12px;margin-top:8px;max-width:440px;border-left:4px solid}
.embed.purple{background:#1f1f30;border-color:#8b5cf6}
.embed.green{background:#1a2a1a;border-color:#22c55e}
.embed.orange{background:#2a1f1a;border-color:#f97316}
.embed.cyan{background:#1a2a2f;border-color:#06b6d4}
.embed.red{background:#2a1a1a;border-color:#ef4444}
.embed .e-title{font-weight:700;font-size:14px;margin-bottom:6px}
.embed .e-field{margin-top:6px;font-size:13px}
.embed .e-field .label{color:#6b6b80;font-size:12px}
.embed .e-inline{display:flex;gap:16px;flex-wrap:wrap}
.embed .e-inline .e-field{flex:1;min-width:80px}
.input-area{padding:12px 16px;background:#1a1a24}
.input-area .wrap{background:#2a2a3a;border-radius:8px;display:flex;align-items:center;padding:0 16px}
.input-area input{flex:1;background:none;border:none;color:#dbdee1;padding:12px 0;font-size:14px;outline:none;min-height:44px}
.input-area input::placeholder{color:#4a4a5c}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){
.sidebar{width:180px}
.app{height:calc(100vh - 24px)}
}
@media(max-width:480px){
.sidebar{display:none}
.app{border-radius:8px;height:calc(100vh - 24px)}
}
</style>
</head>
<body>
<div class="app">
<div class="sidebar">
<div class="server"><span class="icon">🎮</span> Nexus Gaming</div>
<div class="categories">
<div class="cat-label">📢 Information</div>
<div class="ch" onclick="sw('welcome')"><span class="sym">#</span> welcome</div>
<div class="ch" onclick="sw('rules')"><span class="sym">#</span> rules</div>
<div class="ch" onclick="sw('announcements')"><span class="sym">#</span> announcements</div>
<div class="cat-label">💬 Community</div>
<div class="ch active" onclick="sw('general')"><span class="sym">#</span> general</div>
<div class="ch" onclick="sw('memes')"><span class="sym">#</span> memes</div>
<div class="ch" onclick="sw('clips')"><span class="sym">#</span> clips-highlights</div>
<div class="cat-label">🎮 Game Channels</div>
<div class="ch" onclick="sw('valorant')"><span class="sym">#</span> valorant</div>
<div class="ch" onclick="sw('minecraft')"><span class="sym">#</span> minecraft</div>
<div class="ch" onclick="sw('fortnite')"><span class="sym">#</span> fortnite</div>
<div class="cat-label">🔊 Voice</div>
<div class="ch voice" onclick="sw('general')"><span class="sym">🔊</span> Lobby</div>
<div class="ch voice" onclick="sw('general')"><span class="sym">🔊</span> Ranked Queue</div>
<div class="ch voice" onclick="sw('general')"><span class="sym">🔊</span> Chill Zone</div>
<div class="cat-label">🤖 Bot Feeds</div>
<div class="ch" onclick="sw('social-feed')"><span class="sym">#</span> social-feed</div>
<div class="ch" onclick="sw('bot-log')"><span class="sym">#</span> bot-log</div>
</div>
<div class="online-count"><span class="dot"></span>247 Online</div>
</div>
<div class="main">
<div class="topbar"><span class="sym">#</span> <span id="topbar">general</span></div>
<div class="messages" id="messages"></div>
<div class="input-area"><div class="wrap">
<input type="text" id="input" placeholder="Try: /setup, /channels, /bots, /feed, /roles, /stats" autocomplete="off">
</div></div>
</div>
</div>
<script>
const msgs=document.getElementById('messages'),input=document.getElementById('input');
const t=()=>{const d=new Date();return'Today at '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0')};
function add(author,text,embed,type='bot'){
const g=document.createElement('div');g.className='msg-group';
const badges={'NexusBot':'<span class="badge bot-badge">BOT</span>','FeedBot':'<span class="badge bot-badge">BOT</span>','Admin':'<span class="badge admin">ADMIN</span>'};
const avatarClass=type==='user'?'user':type==='feed'?'feed':'bot';
const emoji=type==='user'?'👤':type==='feed'?'📡':'🤖';
let h='<div class="avatar '+avatarClass+'">'+emoji+'</div>';
h+='<div class="content"><div class="author">'+author+(badges[author]||'')+'<span class="time">'+t()+'</span></div>';
h+='<div class="text">'+text+'</div>';
if(embed)h+=embed;
h+='</div>';g.innerHTML=h;msgs.appendChild(g);msgs.scrollTop=msgs.scrollHeight}
function emb(title,fields,color='purple'){
let h='<div class="embed '+color+'"><div class="e-title">'+title+'</div>';
if(Array.isArray(fields[0])){h+='<div class="e-inline">';fields.forEach(f=>h+='<div class="e-field"><div class="label">'+f[0]+'</div>'+f[1]+'</div>');h+='</div>'}
else fields.forEach(f=>h+='<div class="e-field"><div class="label">'+f[0]+'</div>'+f[1]+'</div>');
return h+'</div>'}

const commands={
'/setup':()=>add('NexusBot','Here\'s your server setup overview:',emb('🎮 Nexus Gaming — Server Setup',[
['Categories','📢 Information (3ch) • 💬 Community (3ch) • 🎮 Games (3ch) • 🔊 Voice (3ch) • 🤖 Bots (2ch)'],
['Total Channels','14 Text + 3 Voice = 17 channels'],
['Bots Active','NexusBot (mod) • FeedBot (social) • MusicBot (voice)'],
['Security','Verification gate • Anti-spam • Auto-mod • Raid protection'],
['Features','Custom roles • XP system • Auto-feed • Welcome messages']
],'purple')),
'/channels':()=>add('NexusBot','',emb('📋 Channel Structure',[
['📢 INFORMATION','#welcome — Server intro & rules link\n#rules — Server rules & guidelines\n#announcements — Updates & news'],
['💬 COMMUNITY','#general — Main hangout\n#memes — Meme sharing\n#clips-highlights — Gaming clips'],
['🎮 GAME CHANNELS','#valorant — Valorant LFG & discussion\n#minecraft — MC server & builds\n#fortnite — Fortnite squads'],
['🔊 VOICE','Lobby — Open chat\nRanked Queue — Competitive\nChill Zone — Music & chill'],
['🤖 BOT FEEDS','#social-feed — Twitter/YouTube/Twitch\n#bot-log — Mod actions & logs']
],'cyan')),
'/bots':()=>add('NexusBot','',emb('🤖 Bot Configuration',[
['NexusBot (Moderation)','✅ Auto-mod: spam, slurs, links\n✅ Welcome DM to new members\n✅ Role assignment on join\n✅ Logging all mod actions\n✅ Ticket system for support'],
['FeedBot (Social Feeds)','✅ Twitter → #social-feed (every 15min)\n✅ YouTube uploads → #announcements\n✅ Twitch live alerts → #general\n✅ Reddit top posts → #memes'],
['MusicBot (Voice)','✅ Play/queue/skip commands\n✅ Spotify & YouTube support\n✅ 24/7 lofi in Chill Zone']
],'green')),
'/feed':()=>{add('FeedBot','New social content incoming!',emb('🐦 Twitter — @NexusGaming',[['Latest Tweet','"🏆 GG to our Valorant squad for hitting Diamond! Next stop: Immortal. Who\'s joining us tonight? 🎮"'],['Engagement','❤️ 142 • 🔄 38 • 💬 24'],['Posted','2 hours ago']],'orange'));
setTimeout(()=>add('FeedBot','',emb('📺 YouTube — Nexus Gaming',[['New Upload','"INSANE 1v5 ACE in Ranked — Nexus Highlights #47"'],['Views','12.4K in 6 hours'],['Status','🔴 Auto-posted to #announcements']],'red'),null,'feed'),800);
setTimeout(()=>add('FeedBot','',emb('🟣 Twitch — NexusLive',[['Status','🔴 LIVE NOW — Playing Valorant'],['Viewers','834 watching'],['Alert','Sent to #general + @Stream Ping role']],'purple'),null,'feed'),1400)},
'/roles':()=>add('NexusBot','',emb('🏷 Role Setup',[
['Admin Roles','👑 Owner • 🛡 Admin • ⚔️ Moderator'],
['Game Roles','🎯 Valorant • ⛏ Minecraft • 🔫 Fortnite'],
['Level Roles','⭐ Lvl 5 (Rookie) • 💎 Lvl 15 (Pro) • 🏆 Lvl 30 (Legend)'],
['Special','🔔 Announcements • 📺 Stream Ping • 🎉 Events'],
['Auto-Assign','New members get: @Member + game roles via reaction']
],'purple')),
'/stats':()=>add('NexusBot','',emb('📊 Server Statistics',[['Members','1,847 total • 247 online'],['Growth','+124 this week (+7.2%)'],['Messages Today','4,291 across all channels'],['Most Active','#general (1.2K) • #valorant (890)'],['Voice Users','34 currently in voice'],['Top Contributor','@xNova — 342 messages today']],'green')),
'/welcome':()=>add('NexusBot','',emb('👋 Welcome Message Preview',[['Auto-DM','Hey {user}! Welcome to **Nexus Gaming** 🎮\n\n✅ Read #rules\n✅ Pick game roles in #welcome\n✅ Jump into #general and say hi!\n\nSee you on the battlefield! ⚔️'],['Trigger','On member join → DM + #welcome mention'],['Role','Auto-assign @Member']],'purple'))
};
function send(){
const v=input.value.trim();if(!v)return;add('You',v,null,'user');input.value='';
const cmd=v.toLowerCase().split(' ')[0];
if(commands[cmd])setTimeout(commands[cmd],400);
else setTimeout(()=>add('NexusBot','Unknown command. Try: <code>/setup</code> <code>/channels</code> <code>/bots</code> <code>/feed</code> <code>/roles</code> <code>/stats</code>'),400)}
input.addEventListener('keypress',e=>{if(e.key==='Enter')send()});
function sw(name){
document.querySelectorAll('.ch').forEach(c=>c.classList.remove('active'));
const el=document.querySelector('.ch[onclick*="\''+name+'\'"]');
if(el)el.classList.add('active');
document.getElementById('topbar').textContent=name;
msgs.innerHTML='';
if(name==='social-feed'){
add('FeedBot','📡 Social feeds are automatically posted here.',emb('🐦 Latest Tweet — @NexusGaming',[['Content','"Road to 2K members! Drop a 🎮 if you\'re hyped!"'],['Stats','❤️ 89 • 🔄 23']],'orange'),null,'feed');
}else if(name==='bot-log'){
add('NexusBot','📋 Moderation log:',emb('🔨 Auto-Mod Actions (Last 24h)',[['Spam Blocked','12 messages'],['Links Removed','3 unauthorized'],['Warnings Issued','2 users'],['Status','✅ All clear — no escalations']],'red'));
}else{add('NexusBot','Welcome to <b>#'+name+'</b>! Type <code>/setup</code> to see the full server configuration.')}}
setTimeout(()=>{
add('NexusBot','🎮 <b>Nexus Gaming Server</b> — fully configured and ready!\n\nType a command to explore the setup:');
setTimeout(()=>add('NexusBot','',emb('⚡ Quick Commands',[
['Server Overview','/setup — Full server config'],
['Channel Map','/channels — All channels explained'],
['Bot Setup','/bots — Bot configuration details'],
['Social Feeds','/feed — Live feed preview'],
['Roles','/roles — Role hierarchy & auto-assign'],
['Statistics','/stats — Server analytics']
],'purple')),600);
},300);
</script>
</body>
</html>
