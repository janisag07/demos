<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Customer Service Bot — Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
.tabs{display:flex;gap:0;margin-bottom:0;width:100%;max-width:420px}
.tab{flex:1;padding:14px 8px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;border:none;background:#e2e8f0;color:#64748b;transition:all .2s;min-height:48px}
.tab:first-child{border-radius:16px 0 0 0}
.tab:last-child{border-radius:0 16px 0 0}
.tab.active{background:#1e3a5f;color:#fff}
.panel{display:none;width:100%;max-width:420px}
.panel.active{display:flex;flex-direction:column}
/* WhatsApp Panel */
.wa{background:#0b141a;border-radius:0 0 24px 24px;height:600px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.wa .header{background:#1f2c34;padding:10px 16px;display:flex;align-items:center;gap:12px}
.wa .header .avatar{width:40px;height:40px;border-radius:50%;background:#1e3a5f;display:flex;align-items:center;justify-content:center;font-size:18px}
.wa .header .info .name{font-size:16px;font-weight:500;color:#e9edef}
.wa .header .info .status{font-size:12px;color:#00c853}
.wa .chat{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:6px;color:#e9edef}
.wa .msg{max-width:82%;padding:8px 12px;border-radius:8px;font-size:14px;line-height:1.45;animation:fadeIn .25s}
.wa .msg.bot{background:#1f2c34;align-self:flex-start;border-top-left-radius:0}
.wa .msg.user{background:#005c4b;align-self:flex-end;border-top-right-radius:0}
.wa .msg .time{font-size:11px;color:#8696a0;text-align:right;margin-top:3px}
.wa .buttons{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.wa .buttons button{background:transparent;border:1px solid #4a9eff;color:#4a9eff;padding:10px;border-radius:8px;font-size:13px;cursor:pointer;transition:all .2s;min-height:44px}
.wa .buttons button:hover{background:#4a9eff20}
.wa .input-area{background:#1f2c34;padding:8px 12px;display:flex;gap:8px;align-items:center}
.wa .input-area input{flex:1;background:#2a3942;border:none;color:#e9edef;padding:12px 14px;border-radius:24px;font-size:14px;outline:none;min-height:44px}
.wa .input-area .send{background:#1e3a5f;border:none;color:#fff;width:44px;height:44px;border-radius:50%;cursor:pointer;font-size:18px}
/* Email Panel */
.email{background:#fff;border-radius:0 0 24px 24px;height:600px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.email .header{background:#1e3a5f;padding:14px 16px;color:#fff;font-weight:600;font-size:16px;display:flex;align-items:center;gap:10px}
.email .inbox{flex:1;overflow-y:auto;padding:0}
.email-item{padding:14px 16px;border-bottom:1px solid #e2e8f0;cursor:pointer;transition:background .2s;display:flex;gap:12px;align-items:flex-start;min-height:72px}
.email-item:hover{background:#f8fafc}
.email-item .icon{width:40px;height:40px;border-radius:50%;background:#e8f0fe;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.email-item .icon.replied{background:#dcfce7}
.email-item .body{flex:1;min-width:0}
.email-item .subject{font-weight:600;font-size:14px;color:#1a1a2e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.email-item .preview{font-size:13px;color:#64748b;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.email-item .meta{font-size:11px;color:#94a3b8;margin-top:4px;display:flex;gap:8px;align-items:center}
.email-item .tag{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}
.tag.auto{background:#dcfce7;color:#16a34a}
.tag.pending{background:#fef3c7;color:#d97706}
.tag.escalated{background:#fee2e2;color:#dc2626}
/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 16px;background:#f8fafc;border-bottom:1px solid #e2e8f0}
.stat{text-align:center}
.stat .num{font-size:22px;font-weight:700;color:#1e3a5f}
.stat .lbl{font-size:11px;color:#64748b}
.footer{text-align:center;color:#94a3b8;font-size:11px;padding:8px;background:#f8fafc;border-radius:0 0 24px 24px}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:440px){.tabs,.panel{max-width:100%}.wa,.email{height:calc(100vh - 100px);border-radius:0 0 16px 16px}.tabs .tab{font-size:13px}}
</style>
</head>
<body>
<div class="tabs">
<div class="tab active" onclick="showPanel('whatsapp')">💬 WhatsApp Bot</div>
<div class="tab" onclick="showPanel('emailpanel')">📧 Email Auto-Reply</div>
</div>

<div class="panel active" id="whatsapp">
<div class="wa">
<div class="header">
<div class="avatar">🏢</div>
<div class="info">
<div class="name">ServiceBot AI</div>
<div class="status">● online — avg reply: 3s</div>
</div>
</div>
<div class="chat" id="wachat"></div>
<div class="input-area">
<input type="text" id="wainput" placeholder="Ask about services, pricing..." autocomplete="off">
<button class="send" onclick="waSend()">➤</button>
</div>
</div>
</div>

<div class="panel" id="emailpanel">
<div class="email">
<div class="header">📧 AI Email Dashboard</div>
<div class="stats">
<div class="stat"><div class="num" id="s1">47</div><div class="lbl">Auto-Replied</div></div>
<div class="stat"><div class="num" id="s2">3s</div><div class="lbl">Avg Response</div></div>
<div class="stat"><div class="num" id="s3">94%</div><div class="lbl">Resolved</div></div>
</div>
<div class="inbox" id="inbox"></div>
<div class="footer">AI processes incoming emails → auto-replies or escalates</div>
</div>
</div>

<script>
function showPanel(id){
document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
event.target.classList.add('active');
}
/* WhatsApp Bot */
const wachat=document.getElementById('wachat'),wainput=document.getElementById('wainput');
let inquiry={};
const now=()=>{const d=new Date();return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0')};
function waAdd(text,isBot,buttons){
const d=document.createElement('div');d.className='msg '+(isBot?'bot':'user');
d.innerHTML=text+'<div class="time">'+now()+'</div>';
if(buttons){const b=document.createElement('div');b.className='buttons';
buttons.forEach(([l,a])=>{const btn=document.createElement('button');btn.textContent=l;btn.onclick=()=>waHandle(a,l);b.appendChild(btn)});d.appendChild(b)}
wachat.appendChild(d);wachat.scrollTop=wachat.scrollHeight}
function waType(text,buttons,delay=600){setTimeout(()=>waAdd(text,true,buttons),delay)}
function waHandle(a,l){
waAdd(l,false);
if(a==='services'){waType('What service are you interested in?',[['🧹 Regular Cleaning','svc_clean'],['🏗 Deep Clean / Renovation','svc_deep'],['📦 Moving Help','svc_move'],['🔧 Maintenance & Repair','svc_repair']])}
else if(a.startsWith('svc_')){inquiry.svc=l;waType('📐 What\'s the approximate size?',[['🏠 Small (< 50m²)','sz_s'],['🏡 Medium (50-120m²)','sz_m'],['🏢 Large (120-300m²)','sz_l'],['🏗 Commercial (300m²+)','sz_xl']])}
else if(a.startsWith('sz_')){inquiry.size=l;waType('📅 When do you need this?',[['⚡ ASAP (within 24h)','when_asap'],['📅 This Week','when_week'],['🗓 Schedule for Later','when_later']])}
else if(a.startsWith('when_')){inquiry.when=l;
const prices={'🧹 Regular Cleaning':'$80–150','🏗 Deep Clean / Renovation':'$200–450','📦 Moving Help':'$150–350','🔧 Maintenance & Repair':'$90–250'};
const p=prices[inquiry.svc]||'$100–300';
waType('💰 <b>Instant Quote</b>\n\n📋 '+inquiry.svc+'\n📐 '+inquiry.size+'\n📅 '+inquiry.when+'\n\n💵 <b>Estimated Price: '+p+'</b>\n<i>Final price confirmed after inspection</i>\n\n✅ No hidden fees\n🔒 Insured & licensed',
[['✅ Book Now','book_confirm'],['💬 Ask Question','ask_q'],['📋 Other Services','services']],800)}
else if(a==='book_confirm'){waType('🎉 <b>Booking Confirmed!</b>\n\n📝 Reference: CS-'+Math.floor(Math.random()*90000+10000)+'\n📧 Confirmation sent to your email\n📱 Our team will contact you within 1 hour\n\n⭐ Rate us after the service for 10% off next booking!',
[['📋 New Inquiry','services'],['❓ FAQ','faq'],['👤 Speak to Human','human']])}
else if(a==='pricing'){waType('💰 <b>Quick Pricing Guide</b>\n\n🧹 Regular Cleaning: $80–150\n🏗 Deep Clean: $200–450\n📦 Moving Help: $150–350\n🔧 Repairs: $90–250\n\n💡 Get an exact quote by telling me your needs!',
[['📋 Get Quote','services'],['❓ FAQ','faq'],['🔙 Menu','menu']])}
else if(a==='faq'){waType('Common questions:',[['⏰ Business Hours?','faq_hours'],['💳 Payment Methods?','faq_pay'],['🔄 Cancellation?','faq_cancel'],['🔙 Menu','menu']])}
else if(a==='faq_hours'){waType('⏰ <b>Business Hours</b>\n\nMon-Fri: 8AM – 8PM\nSaturday: 9AM – 6PM\nSunday: 10AM – 4PM\n\n⚡ Emergency service available 24/7\n(+30% surcharge)',
[['📋 Get Quote','services'],['🔙 Menu','menu']])}
else if(a==='faq_pay'){waType('💳 <b>Payment Options</b>\n\n✅ Cash on completion\n✅ Credit/Debit Card\n✅ Bank Transfer\n✅ PayMe / FPS\n✅ Monthly invoicing (business)\n\n🔒 Secure & transparent',
[['📋 Get Quote','services'],['🔙 Menu','menu']])}
else if(a==='faq_cancel'){waType('🔄 <b>Cancellation Policy</b>\n\n• 24h+ before: Free cancellation\n• 12-24h: 50% fee\n• < 12h: Full charge\n\n📞 Call us for special circumstances',
[['📋 Get Quote','services'],['🔙 Menu','menu']])}
else if(a==='ask_q'){waType('Sure! What would you like to know?\n\nYou can ask about:\n• Service details\n• Pricing breakdown\n• Availability\n• Special requirements',
[['📋 Services','services'],['💰 Pricing','pricing'],['❓ FAQ','faq']])}
else if(a==='human'){waType('👋 Connecting to a customer service agent...\n\n🟢 <b>Agent Lisa</b> will be with you in ~2 minutes.\n\nMeanwhile, I can still help with quick questions!',
[['❓ FAQ','faq'],['📋 Services','services'],['🔙 Menu','menu']])}
else if(a==='menu'){waType('How can I help you today?',[['📋 Our Services','services'],['💰 Quick Pricing','pricing'],['❓ FAQ','faq'],['👤 Talk to Human','human']])}
}
function waSend(){
const v=wainput.value.trim();if(!v)return;waAdd(v,false);wainput.value='';
const m=v.toLowerCase(),pick=a=>a[Math.floor(Math.random()*a.length)],is=(...k)=>k.some(x=>m.includes(x));
if(is('price','cost','quote','how much','wieviel','kosten'))waHandle('pricing','Pricing');
else if(is('book','reserv','schedule','termin','buchen'))waHandle('services','Services');
else if(is('cancel','storno','absag'))waHandle('faq_cancel','Cancellation');
else if(is('hour','time','open','wann','öffnung','geöffnet'))waHandle('faq_hours','Hours');
else if(is('pay','zahlung','bezahl','credit','cash'))waHandle('faq_pay','Payment');
else if(is('human','agent','person','mensch','someone','real'))waHandle('human','Human');
else if(is('wie geht','how are','how r u','geht es','what\'s up','was geht')){waType(pick([
'Thanks for asking! 😊 I\'m ServiceBot AI — always running, always ready. More importantly, how can I help YOU today? Looking for a service or have a question?',
'I\'m doing great — ready to help! 🤖 Do you need a quote, want to book a service, or just have a question?',
'All good here! I\'m available 24/7 for you. What brings you in today — need a service or looking for info?'
]),[['📋 Our Services','services'],['💰 Pricing','pricing'],['❓ FAQ','faq']]);}
else if(is('hi','hello','hey','hallo','moin','good morning','good evening')){waType(pick([
'Hey! 👋 Welcome! How can I help you today?',
'Hello! 😊 Good to hear from you. Need a service, a quote, or just have a question?',
'Hi there! I\'m ServiceBot — your 24/7 customer assistant. What can I do for you?'
]),[['📋 Services','services'],['💰 Pricing','pricing'],['❓ FAQ','faq']]);}
else if(is('clean','putz','reinig','sauber','wisch')){waType(pick([
'Great question! We offer everything from regular cleaning to deep cleans. What kind of space do you need cleaned?',
'Cleaning is our specialty! 🧹 Tell me about the space — home, office, or something specific? I\'ll get you an instant quote.',
'Sure! Regular cleaning starts at $80. Want me to walk you through our options so I can find the best fit for you?'
]),[['📋 See Options','services'],['💰 Quick Quote','pricing']]);}
else if(is('office','büro','commercial','business','firma')){waType('We handle commercial spaces of all sizes! 🏢 Regular office cleaning starts at $150/visit for spaces up to 200m². We also offer monthly contracts with discounts up to 20%. How big is your office?',
[['📋 Get Quote','services'],['💰 Pricing','pricing']]);}
else if(is('emergency','urgent','dringend','sofort','asap','water','flood')){waType('🚨 Emergency services are available 24/7! Our team can be there within 2 hours. There\'s a 30% surcharge for emergency calls, but we prioritize these immediately. Want me to dispatch a team now?',
[['✅ Yes, dispatch now','book_confirm'],['💰 How much?','pricing']]);}
else if(is('thank','danke','thx','appreciated','cheers')){waType(pick([
'You\'re welcome! 😊 Is there anything else I can help with?',
'Happy to help! Don\'t hesitate to reach out anytime — I\'m here 24/7.',
'Glad I could help! If you need anything in the future, just send a message. Have a great day! ☀️'
]),[['📋 New Inquiry','services'],['🔙 Menu','menu']]);}
else if(is('bye','tschüss','later','ciao')){waType(pick([
'Goodbye! Thanks for reaching out. Have a wonderful day! 👋',
'Take care! Remember, you can message me anytime. 😊']),null);}
else if(is('who','what do you','what can you','wer bist','was machst','was kannst')){waType('I\'m ServiceBot AI 🤖 — your 24/7 customer service assistant. I can:\n\n• Give instant quotes for any service\n• Book appointments in seconds\n• Answer questions about hours, payments, policies\n• Connect you to a human agent if needed\n\nWhat can I help you with?',
[['📋 Services','services'],['💰 Pricing','pricing'],['👤 Human Agent','human']]);}
else{waType(pick([
'I\'d love to help with that! Could you tell me a bit more? I can assist with service bookings, pricing, scheduling, and general questions.',
'Thanks for reaching out! I handle all customer inquiries — from quick quotes to full bookings. What specifically do you need?',
'Good question! Let me help you with that. Are you looking for a specific service, or do you need general information?',
'I\'m here to help! Whether it\'s a quote, a booking, or just a question — fire away. Or I can show you our most popular services.'
]),[['📋 Our Services','services'],['💰 Pricing','pricing'],['❓ FAQ','faq']]);}
}
wainput.addEventListener('keypress',e=>{if(e.key==='Enter')waSend()});
setTimeout(()=>waType('👋 Welcome to <b>ServiceBot AI</b>!\n\nI handle customer inquiries 24/7 — services, pricing, bookings, and support.\n\nHow can I help you today?',
[['📋 Our Services','services'],['💰 Quick Pricing','pricing'],['❓ FAQ','faq'],['👤 Talk to Human','human']]),400);

/* Email Panel */
const emails=[
{icon:'📨',subject:'Quote request for office cleaning',preview:'Hi, I need weekly cleaning for 200m² office...',tag:'auto',tagLabel:'Auto-Replied',time:'2 min ago',replied:true},
{icon:'📨',subject:'Re: Booking #CS-48291 confirmation',preview:'Thank you! The booking has been confirmed. Here\'s your...',tag:'auto',tagLabel:'Auto-Replied',time:'8 min ago',replied:true},
{icon:'📨',subject:'Complaint about last service',preview:'The cleaning team missed the bathroom and...',tag:'escalated',tagLabel:'Escalated',time:'15 min ago',replied:false},
{icon:'📨',subject:'Do you offer weekend service?',preview:'Hi, I was wondering if your team works on...',tag:'auto',tagLabel:'Auto-Replied',time:'22 min ago',replied:true},
{icon:'📨',subject:'Invoice question #INV-2024-089',preview:'I noticed a discrepancy in the last invoice...',tag:'pending',tagLabel:'Pending Review',time:'34 min ago',replied:false},
{icon:'📨',subject:'New client — bulk cleaning contract',preview:'We have 12 locations across the city and need...',tag:'auto',tagLabel:'Auto-Replied',time:'1h ago',replied:true},
{icon:'📨',subject:'Re: Emergency water damage cleanup',preview:'AI forwarded to emergency team. Estimated arrival...',tag:'auto',tagLabel:'Auto-Replied',time:'1h ago',replied:true},
];
const inbox=document.getElementById('inbox');
emails.forEach(e=>{
const d=document.createElement('div');d.className='email-item';
d.innerHTML=`<div class="icon ${e.replied?'replied':''}">${e.replied?'✅':'📨'}</div>
<div class="body"><div class="subject">${e.subject}</div><div class="preview">${e.preview}</div>
<div class="meta"><span class="tag ${e.tag}">${e.tagLabel}</span><span>${e.time}</span></div></div>`;
inbox.appendChild(d);
});
</script>
</body>
</html>
